name: keepsake-production

services:
  postgres:
    image: postgres:17-alpine
    container_name: keepsake_postgres_production
    restart: unless-stopped
    env_file:
      - ./secrets/.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - keepsake_postgres_production_data:/var/lib/postgresql/data
    networks:
      - keepsake_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 15

  migrate:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.migrate
    profiles:
      - tools
    env_file:
      - ./secrets/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - keepsake_internal

  app:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.app
    container_name: keepsake_app_production
    restart: unless-stopped
    env_file:
      - ./secrets/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - keepsake_internal

  worker:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.worker
    container_name: keepsake_worker_production
    restart: unless-stopped
    env_file:
      - ./secrets/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - keepsake_internal

networks:
  keepsake_internal:
    driver: bridge

volumes:
  keepsake_postgres_production_data: